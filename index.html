<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>今日の3文</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@300;400;500;700&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #fdf6ee;
    font-family: 'Noto Serif KR', Georgia, serif;
    color: #2d1f0e;
  }
  .jp { font-family: 'M PLUS 1p', sans-serif; letter-spacing: 0.02em; }

  /* ── 헤더 ── */
  #header {
    background: #fffcf7;
    border-bottom: 1.5px solid #e8d9c4;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  #header .logo { font-family: 'M PLUS 1p', sans-serif; font-size: 20px; font-weight: 700; color: #c9602a; }
  #header .logo-sub { font-size: 11px; color: #a08060; }
  .streak-pill {
    display: inline-flex; align-items: center; gap: 4px;
    background: #fff4e6; border: 1.5px solid #ffd9a8;
    border-radius: 20px; padding: 4px 12px; font-size: 14px;
  }
  .streak-count { font-weight: 700; color: #c9602a; }
  .streak-label { color: #a08060; font-size: 12px; }

  /* ── 네비 ── */
  nav {
    display: flex; gap: 8px; justify-content: center;
    padding: 10px 0 4px;
  }
  .nav-btn {
    background: none; border: none; font-family: inherit;
    font-size: 13px; color: #a08060; cursor: pointer;
    padding: 6px 14px; border-radius: 20px; transition: all 0.2s;
  }
  .nav-btn.active { background: #fef0e7; color: #c9602a; font-weight: 600; }

  /* ── 컨테이너 ── */
  #app { max-width: 500px; margin: 0 auto; padding: 14px 14px 80px; }

  /* ── 카드 ── */
  .card {
    background: #fffcf7; border: 1.5px solid #e8d9c4;
    border-radius: 16px; padding: 18px; margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(180,140,80,0.07);
  }
  .divider { height: 1px; background: linear-gradient(to right,transparent,#e8d9c4,transparent); margin: 12px 0; }

  /* ── 힌트 태그 ── */
  .hints { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 2px; }
  .hint-tag {
    display: inline-flex; align-items: center; gap: 5px;
    background: #fef0e7; border: 1px solid #f5d5b8;
    border-radius: 20px; padding: 4px 12px; font-size: 13px;
  }
  .hint-jp { font-family: 'M PLUS 1p', sans-serif; font-weight: 500; }
  .hint-read { font-size: 11px; color: #a08060; }
  .hint-ko { color: #a08060; }

  /* ── 레벨 버튼 ── */
  .lv-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .lv-label { font-size: 12px; color: #a08060; }
  .lv-btn {
    background: none; border: 1.5px solid #ddd0bc;
    border-radius: 20px; padding: 5px 16px; font-size: 13px;
    font-family: inherit; cursor: pointer; color: #8a7060; transition: all 0.2s;
  }
  .lv-btn.on { background: #c9602a; color: white; border-color: #c9602a; }

  /* ── textarea ── */
  .num-label { font-size: 11px; color: #c9602a; font-weight: 700; letter-spacing: 1px; margin-bottom: 7px; }
  textarea {
    width: 100%; border: 1.5px solid #ddd0bc; border-radius: 10px;
    padding: 11px 13px; font-size: 15px;
    font-family: 'M PLUS 1p', sans-serif; font-weight: 400;
    background: #fdfaf6; color: #2d1f0e;
    resize: none; outline: none; transition: border 0.2s; line-height: 1.9;
  }
  textarea::placeholder { color: #b8a890; font-size: 14px; letter-spacing: 0.05em; }
  textarea:focus { border-color: #c9602a; background: white; }

  /* ── 버튼 ── */
  .btn-main {
    background: #c9602a; color: white; border: none;
    border-radius: 12px; padding: 14px; font-size: 16px;
    font-family: inherit; cursor: pointer; width: 100%;
    font-weight: 600; transition: all 0.2s;
  }
  .btn-main:hover { background: #a84e20; transform: translateY(-1px); }
  .btn-main:disabled { background: #d4b99a; cursor: not-allowed; transform: none; }
  .btn-ghost {
    background: transparent; border: 1.5px solid #c9602a;
    color: #c9602a; border-radius: 10px; padding: 10px 14px;
    font-size: 14px; font-family: inherit; cursor: pointer; transition: all 0.2s;
  }
  .btn-ghost:hover { background: #fef0e7; }
  .btn-row { display: flex; gap: 10px; margin-top: 4px; }
  .btn-row .btn-ghost { flex: 1; }
  .btn-row .btn-main { flex: 2; }

  /* ── 결과 화면 ── */
  .overall-card {
    background: linear-gradient(135deg,#fef9f2,#fff4e6);
    border: 1.5px solid #f5d5b8; border-radius: 16px;
    padding: 18px; margin-bottom: 14px;
  }
  .section-label { font-size: 11px; color: #a08060; margin-bottom: 5px; letter-spacing: 0.5px; }
  .overall-text { font-size: 15px; line-height: 1.85; color: #4a3020; }

  .correction-card {
    background: #fffcf7; border: 1.5px solid #e8d9c4;
    border-radius: 16px; padding: 18px; margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(180,140,80,0.07);
  }
  .corr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .corr-num { font-size: 12px; color: #a08060; }
  .badge { display: inline-block; border-radius: 20px; padding: 3px 12px; font-size: 12px; font-weight: 600; color: white; }

  .original-sentence { font-family: 'M PLUS 1p', sans-serif; font-size: 16px; margin-bottom: 10px; letter-spacing: 0.02em; }
  .original-sentence.fix { color: #c0392b; text-decoration: line-through; opacity: 0.65; }
  .original-sentence.ok { color: #2d1f0e; }

  .corrected-sentence { font-family: 'M PLUS 1p', sans-serif; font-size: 16px; color: #27ae60; font-weight: 600; margin-bottom: 10px; letter-spacing: 0.02em; }

  .reason-box {
    background: #fafaf8; border: 1px solid #eee;
    border-radius: 8px; padding: 8px 12px;
  }
  .reason-text { font-size: 13px; color: #5a4030; line-height: 1.75; }
  .tip-text { font-size: 12px; color: #a08060; margin-top: 4px; font-style: italic; }

  .new-expr {
    background: linear-gradient(135deg,#fef9f2,#fdf0e0);
    border: 1.5px solid #f5d5b8; border-radius: 12px;
    padding: 16px; margin-bottom: 16px;
  }
  .expr-jp { font-family: 'M PLUS 1p', sans-serif; font-size: 22px; font-weight: 700; color: #c9602a; }
  .expr-read { font-size: 13px; color: #a08060; margin-left: 6px; }
  .expr-ko { font-size: 14px; color: #5a4030; margin: 4px 0; }
  .expr-ex { font-family: 'M PLUS 1p', sans-serif; font-size: 13px; color: #8a7060; font-style: italic; letter-spacing: 0.02em; }

  /* ── 에러 ── */
  .error-box {
    background: #fff5f5; border: 1.5px solid #fca5a5;
    border-radius: 12px; padding: 18px; color: #c0392b;
    line-height: 1.8; font-size: 14px; word-break: break-all;
    margin-bottom: 12px;
  }

  /* ── 히스토리 ── */
  .hist-count { font-size: 13px; color: #a08060; margin-bottom: 14px; text-align: center; }
  .hist-empty { text-align: center; padding: 40px 20px; color: #a08060; }
  .hist-empty-icon { font-size: 30px; margin-bottom: 10px; }

  .hist-card {
    background: #fffcf7; border: 1.5px solid #e8d9c4;
    border-left: 3px solid #c9602a;
    border-radius: 16px; padding: 16px; margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(180,140,80,0.07);
  }
  .hist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .hist-date { font-size: 12px; color: #a08060; }
  .hist-topic { font-family: 'M PLUS 1p', sans-serif; font-size: 13px; color: #c9602a; }
  .hist-sentence { font-family: 'M PLUS 1p', sans-serif; font-size: 14px; color: #4a3020; line-height: 1.8; margin-bottom: 2px; letter-spacing: 0.02em; }
  .hist-overall { font-size: 12px; color: #8a7060; margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; font-style: italic; line-height: 1.6; }

  /* ── 애니메이션 ── */
  .fade-in { animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ── 로딩 스피너 ── */
  .loading-text { text-align: center; padding: 30px; color: #a08060; font-size: 15px; }

  /* ── 스크린 ── */
  .screen { display: none; }
  .screen.active { display: block; }
</style>
</head>
<body>

<!-- 헤더 -->
<div id="header">
  <div>
    <div class="logo jp">今日の3文</div>
    <div class="logo-sub">오늘의 일본어 작문</div>
  </div>
  <div class="streak-pill">
    🔥 <span class="streak-count" id="streakCount">0</span>
    <span class="streak-label">일 연속</span>
  </div>
</div>

<!-- 네비 -->
<nav>
  <button class="nav-btn active" data-target="home" onclick="goScreen('home')">✏️ 오늘 작문</button>
  <button class="nav-btn" data-target="history" onclick="goScreen('history')">📖 내 기록</button>
</nav>

<div id="app">

  <!-- ── 홈 화면 ── -->
  <div class="screen active fade-in" id="screen-home">
    <!-- 주제 카드 -->
    <div class="card" style="border-left: 4px solid #c9602a;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <span id="topicEmoji" style="font-size:26px;"></span>
        <div>
          <div style="font-size:11px;color:#a08060;margin-bottom:2px;">오늘의 주제</div>
          <div id="topicTitle" class="jp" style="font-size:20px;font-weight:700;"></div>
          <div id="topicKorean" style="font-size:13px;color:#8a7060;"></div>
        </div>
      </div>
      <div class="divider"></div>
      <div style="font-size:11px;color:#a08060;margin-bottom:8px;">💡 힌트 단어</div>
      <div class="hints" id="hintsContainer"></div>
    </div>

    <!-- 레벨 -->
    <div class="lv-row">
      <span class="lv-label">내 레벨:</span>
      <button class="lv-btn on" onclick="setLevel('초급', this)">초급</button>
      <button class="lv-btn" onclick="setLevel('중급', this)">중급</button>
    </div>

    <!-- 문장 입력 -->
    <div class="card" style="margin-bottom:12px;">
      <div class="num-label">문장 1</div>
      <textarea id="s0" rows="2" oninput="checkSubmit()"></textarea>
    </div>
    <div class="card" style="margin-bottom:12px;">
      <div class="num-label">문장 2</div>
      <textarea id="s1" rows="2" oninput="checkSubmit()"></textarea>
    </div>
    <div class="card" style="margin-bottom:14px;">
      <div class="num-label">문장 3</div>
      <textarea id="s2" rows="2" oninput="checkSubmit()"></textarea>
    </div>

    <button class="btn-main" id="submitBtn" onclick="handleSubmit()" disabled>📮 첨삭 받기</button>
  </div>

  <!-- ── 결과 화면 ── -->
  <div class="screen fade-in" id="screen-result">
    <div id="resultContent"></div>
  </div>

  <!-- ── 기록 화면 ── -->
  <div class="screen fade-in" id="screen-history">
    <div id="historyContent"></div>
  </div>

</div>

<script>
// ══════════════════════════════════════════
// 데이터
// ══════════════════════════════════════════
const TOPICS = [
  {
    emoji: "☀️", title: "今日の天気", korean: "오늘 날씨",
    hints: [{jp:"晴れ",read:"はれ",ko:"맑음"},{jp:"暑い",read:"あつい",ko:"덥다"},{jp:"気持ちいい",read:"きもちいい",ko:"기분 좋다"}],
    placeholders: ["今日は＿＿＿です。","空が＿＿＿ですね。","外で＿＿＿したいです。"]
  },
  {
    emoji: "🍜", title: "好きな食べ物", korean: "좋아하는 음식",
    hints: [{jp:"おいしい",read:"おいしい",ko:"맛있다"},{jp:"辛い",read:"からい",ko:"맵다"},{jp:"甘い",read:"あまい",ko:"달다"}],
    placeholders: ["私は＿＿＿が好きです。","＿＿＿はとても＿＿＿です。","よく＿＿＿を食べます。"]
  },
  {
    emoji: "📚", title: "勉強のこと", korean: "공부 이야기",
    hints: [{jp:"難しい",read:"むずかしい",ko:"어렵다"},{jp:"毎日",read:"まいにち",ko:"매일"},{jp:"練習する",read:"れんしゅうする",ko:"연습하다"}],
    placeholders: ["今、＿＿＿を勉強しています。","＿＿＿が難しいです。","毎日＿＿＿したいです。"]
  },
  {
    emoji: "🎵", title: "音楽・趣味", korean: "음악·취미",
    hints: [{jp:"聴く",read:"きく",ko:"듣다"},{jp:"楽しい",read:"たのしい",ko:"즐겁다"},{jp:"好き",read:"すき",ko:"좋아하다"}],
    placeholders: ["私の趣味は＿＿＿です。","＿＿＿を聴くのが好きです。","週末は＿＿＿します。"]
  },
  {
    emoji: "🌸", title: "季節・自然", korean: "계절·자연",
    hints: [{jp:"きれい",read:"きれい",ko:"예쁘다"},{jp:"春",read:"はる",ko:"봄"},{jp:"咲く",read:"さく",ko:"피다"}],
    placeholders: ["＿＿＿の季節が好きです。","花が＿＿＿います。","自然の中で＿＿＿したいです。"]
  },
  {
    emoji: "🏠", title: "家・部屋", korean: "집·방",
    hints: [{jp:"広い",read:"ひろい",ko:"넓다"},{jp:"掃除する",read:"そうじする",ko:"청소하다"},{jp:"くつろぐ",read:"くつろぐ",ko:"쉬다"}],
    placeholders: ["私の部屋は＿＿＿です。","家で＿＿＿するのが好きです。","今日は＿＿＿を掃除しました。"]
  },
];

// ══════════════════════════════════════════
// 상태
// ══════════════════════════════════════════
const topic = TOPICS[new Date().getDate() % TOPICS.length];
let currentLevel = "초급";
let currentResult = null;

// ══════════════════════════════════════════
// localStorage 유틸
// ══════════════════════════════════════════
function getStreak() {
  try {
    const data = JSON.parse(localStorage.getItem("jp_streak") || "{}");
    const today = new Date().toDateString();
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (data.lastDate === today) return data.count;
    if (data.lastDate === yesterday) return data.count;
    return 0;
  } catch { return 0; }
}

function saveStreak() {
  try {
    const today = new Date().toDateString();
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    const data = JSON.parse(localStorage.getItem("jp_streak") || "{}");
    let newCount;
    if (data.lastDate === today) newCount = data.count;
    else if (data.lastDate === yesterday) newCount = data.count + 1;
    else newCount = 1;
    localStorage.setItem("jp_streak", JSON.stringify({ lastDate: today, count: newCount }));
    document.getElementById("streakCount").textContent = newCount;
    return newCount;
  } catch { return 1; }
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem("jp_history") || "[]"); }
  catch { return []; }
}

function saveHistory(entry) {
  try {
    const h = getHistory();
    // 오늘 날짜 중복 저장 방지 (같은 날 여러 번 첨삭 가능하도록 모두 저장, 최대 50개)
    h.unshift(entry);
    localStorage.setItem("jp_history", JSON.stringify(h.slice(0, 50)));
  } catch {}
}

// ══════════════════════════════════════════
// 화면 초기화
// ══════════════════════════════════════════
function initHome() {
  document.getElementById("topicEmoji").textContent = topic.emoji;
  document.getElementById("topicTitle").textContent = topic.title;
  document.getElementById("topicKorean").textContent = topic.korean;

  const hintsEl = document.getElementById("hintsContainer");
  hintsEl.innerHTML = topic.hints.map(h =>
    `<div class="hint-tag">
      <span class="hint-jp">${h.jp}</span>
      <span class="hint-read">(${h.read})</span>
      <span class="hint-ko">= ${h.ko}</span>
    </div>`
  ).join("");

  topic.placeholders.forEach((ph, i) => {
    document.getElementById("s" + i).placeholder = ph;
  });

  document.getElementById("streakCount").textContent = getStreak();
}

// ══════════════════════════════════════════
// 화면 전환
// ══════════════════════════════════════════
function goScreen(name) {
  document.querySelectorAll(".screen").forEach(el => {
    el.classList.remove("active", "fade-in");
  });
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.target === name);
  });
  const el = document.getElementById("screen-" + name);
  el.classList.add("active");
  requestAnimationFrame(() => el.classList.add("fade-in"));

  if (name === "history") renderHistory();
}

// ══════════════════════════════════════════
// 레벨 선택
// ══════════════════════════════════════════
function setLevel(lv, btn) {
  currentLevel = lv;
  document.querySelectorAll(".lv-btn").forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
}

// ══════════════════════════════════════════
// 제출 버튼 활성화 체크
// ══════════════════════════════════════════
function checkSubmit() {
  const any = [0,1,2].some(i => document.getElementById("s"+i).value.trim());
  document.getElementById("submitBtn").disabled = !any;
}

// ══════════════════════════════════════════
// API 호출 및 첨삭
// ══════════════════════════════════════════
async function handleSubmit() {
  const sentences = [0,1,2].map(i => document.getElementById("s"+i).value.trim());
  const filled = sentences.filter(s => s);
  if (!filled.length) return;

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "✨ 첨삭 중...";

  const writtenLines = sentences
    .map((s, i) => s ? (i+1) + ". " + s : null)
    .filter(Boolean)
    .join(", ");

  const msg =
    "Japanese teacher. Correct these sentences briefly. " +
    "Topic: " + topic.title + ". Level: " + currentLevel + ". " +
    "Student sentences: " + writtenLines + ". " +
    "Reply with ONLY valid JSON, no markdown. Keep each reason under 30 Korean chars, tip under 20 chars. Format: " +
    '{"overall":"총평","corrections":[{"original":"원문","status":"perfect/good/fix","corrected":"수정문","reason":"이유","tip":"팁"}],"newExpression":{"japanese":"표현","reading":"읽기","korean":"뜻","example":"예문"}}';

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2048,
        messages: [{ role: "user", content: msg }],
      }),
    });

    const raw = await res.text();
    if (!res.ok) {
      let m = "HTTP " + res.status;
      try { m = JSON.parse(raw)?.error?.message || m; } catch {}
      throw new Error(m);
    }

    const data = JSON.parse(raw);
    const text = (data.content || []).map(b => b.text || "").join("");
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error("응답을 파싱할 수 없어요.");
    const parsed = JSON.parse(match[0]);

    currentResult = parsed;

    // ✅ localStorage에 저장
    saveStreak();
    saveHistory({
      date: new Date().toLocaleDateString("ko-KR"),
      timestamp: Date.now(),
      topic: topic.title,
      level: currentLevel,
      sentences: [...sentences],
      result: parsed
    });

    renderResult(parsed, sentences);
    goScreen("result");

  } catch (e) {
    renderError(e.message);
    goScreen("result");
  }

  btn.disabled = false;
  btn.textContent = "📮 첨삭 받기";
}

// ══════════════════════════════════════════
// 결과 렌더링
// ══════════════════════════════════════════
function statusColor(s) {
  return s === "perfect" ? "#4ade80" : s === "good" ? "#fbbf24" : "#f87171";
}
function statusLabel(s) {
  return s === "perfect" ? "완벽해요 ✨" : s === "good" ? "거의 완벽 👍" : "수정 필요 ✏️";
}

function renderResult(r, sentences) {
  let html = "";

  // 총평
  html += `<div class="overall-card">
    <div class="section-label">선생님의 총평 💬</div>
    <div class="overall-text">${e(r.overall)}</div>
  </div>`;

  // 문장별 첨삭
  (r.corrections || []).forEach((c, i) => {
    const isFixed = c.status === "fix";
    html += `<div class="correction-card" style="border-left:4px solid ${statusColor(c.status)};">
      <div class="corr-header">
        <span class="corr-num">문장 ${i+1}</span>
        <span class="badge" style="background:${statusColor(c.status)}">${statusLabel(c.status)}</span>
      </div>
      <div class="section-label">내가 쓴 문장</div>
      <div class="original-sentence ${isFixed ? "fix" : "ok"}">${e(c.original)}</div>
      ${c.status !== "perfect" ? `<div class="section-label">수정된 문장</div><div class="corrected-sentence">${e(c.corrected)}</div>` : ""}
      <div class="reason-box">
        <div class="reason-text">${e(c.reason)}</div>
        ${c.tip ? `<div class="tip-text">💡 ${e(c.tip)}</div>` : ""}
      </div>
    </div>`;
  });

  // 오늘의 표현
  if (r.newExpression) {
    const nx = r.newExpression;
    html += `<div class="new-expr">
      <div class="section-label">오늘의 표현 하나 더 🌱</div>
      <div style="display:flex;align-items:baseline;gap:6px;margin:6px 0 2px;">
        <span class="expr-jp">${e(nx.japanese)}</span>
        <span class="expr-read">(${e(nx.reading)})</span>
      </div>
      <div class="expr-ko">${e(nx.korean)}</div>
      <div class="expr-ex">${e(nx.example)}</div>
    </div>`;
  }

  // 버튼
  html += `<div class="btn-row">
    <button class="btn-ghost" onclick="resetHome()">다시 쓰기 ↩️</button>
    <button class="btn-main" onclick="goScreen('history')">내 기록 보기 📖</button>
  </div>`;

  document.getElementById("resultContent").innerHTML = html;
}

function renderError(msg) {
  document.getElementById("resultContent").innerHTML = `
    <div class="error-box">❌ ${e(msg)}</div>
    <p style="font-size:12px;color:#a08060;margin:8px 4px 14px;line-height:1.7;">
      💡 API 키가 없거나 네트워크 오류일 수 있어요. 이 HTML 파일은 Anthropic API 키가 필요해요.
    </p>
    <button class="btn-ghost" style="width:100%;" onclick="goScreen('home')">← 돌아가기</button>
  `;
}

// ══════════════════════════════════════════
// 기록 렌더링 (localStorage에서 읽기)
// ══════════════════════════════════════════
function renderHistory() {
  const history = getHistory();
  const el = document.getElementById("historyContent");

  if (!history.length) {
    el.innerHTML = `
      <div class="hist-count">기록이 없어요</div>
      <div class="hist-empty">
        <div class="hist-empty-icon">✏️</div>
        <div>아직 첨삭 기록이 없어요.</div>
        <div style="font-size:13px;margin-top:4px;">오늘 첫 작문을 해보세요!</div>
      </div>`;
    return;
  }

  let html = `<div class="hist-count">총 ${history.length}건의 첨삭 기록 🎉</div>`;

  history.forEach(h => {
    const filledSentences = (h.sentences || []).filter(s => s && s.trim());
    html += `<div class="hist-card">
      <div class="hist-header">
        <span class="hist-date">${e(h.date)}${h.level ? " · " + e(h.level) : ""}</span>
        <span class="hist-topic jp">${e(h.topic)}</span>
      </div>
      ${filledSentences.map((s, j) =>
        `<div class="hist-sentence">${j+1}. ${e(s)}</div>`
      ).join("")}
      ${h.result && h.result.overall
        ? `<div class="hist-overall">💬 ${e(h.result.overall)}</div>`
        : ""}
    </div>`;
  });

  el.innerHTML = html;
}

// ══════════════════════════════════════════
// 홈 리셋
// ══════════════════════════════════════════
function resetHome() {
  [0,1,2].forEach(i => { document.getElementById("s"+i).value = ""; });
  checkSubmit();
  goScreen("home");
}

// ══════════════════════════════════════════
// XSS 방지 이스케이프
// ══════════════════════════════════════════
function e(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

// ══════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════
initHome();
</script>

</html>
